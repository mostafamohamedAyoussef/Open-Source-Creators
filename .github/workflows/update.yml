name: Daily Database Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# Allow the workflow to commit refreshed data and deploy to Pages.
permissions:
  contents: write
  pages: write
  id-token: write

# Avoid overlapping scheduled runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: PYTHONPATH=. python -m unittest discover -v

    - name: Run Data Collector
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: python scripts/collector.py

    - name: Run Data Processor and Site Generator
      env:
        SITE_URL: ${{ vars.SITE_URL }}
      # PYTHONPATH=. is required: processor.py does `from scripts.site_generator
      # import build_site`, but `python scripts/processor.py` puts scripts/ on
      # sys.path rather than the repo root, so the import fails without it.
      run: PYTHONPATH=. python scripts/processor.py

    - name: Verify generated site output
      # The processor generates the site into the repo root, which is exactly
      # what the upload-pages-artifact step below ships (path: '.'). So we audit
      # the working tree in place rather than rebuilding — no redundant build,
      # and we verify the literal bytes that get deployed. Runs before the data
      # commit and the deploy so an inconsistent build fails loudly instead of
      # shipping (and instead of committing data that generated a broken site).
      run: python scripts/verify_site.py .

    - name: Commit refreshed data
      run: |
        git config --local user.email "contact.mostafayoussef@gmail.com"
        git config --local user.name "Mostafa Mohamed"
        git add data/processed_repos.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update database [skip ci]" && git push)

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        # Uploads the full working tree, including freshly generated project pages
        # and sitemap that are not committed to git.
        path: '.'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
