name: Daily Database Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# The workflow only needs to commit refreshed data. Deployment is Vercel's job:
# it builds from main on every push, so there is nothing to publish from here.
permissions:
  contents: write

# Avoid overlapping scheduled runs.
concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: PYTHONPATH=. python -m unittest discover -v

    - name: Run Data Collector
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: python scripts/collector.py

    - name: Run Data Processor and Site Generator
      env:
        SITE_URL: ${{ vars.SITE_URL }}
      # PYTHONPATH=. is required: processor.py does `from scripts.site_generator
      # import build_site`, but `python scripts/processor.py` puts scripts/ on
      # sys.path rather than the repo root, so the import fails without it.
      run: PYTHONPATH=. python scripts/processor.py

    - name: Verify generated site output
      # The processor generates the site into the repo root, so we audit the
      # working tree in place rather than rebuilding. Runs before the data commit
      # so an inconsistent build fails loudly here instead of committing data
      # that would generate a broken site on Vercel's next deploy.
      run: python scripts/verify_site.py .

    - name: Commit refreshed data
      run: |
        git config --local user.email "contact.mostafayoussef@gmail.com"
        git config --local user.name "Mostafa Mohamed"
        git add data/processed_repos.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update database [skip ci]" && git push)
