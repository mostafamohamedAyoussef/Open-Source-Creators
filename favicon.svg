<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Open-Source Creators">
  <!-- isometric cube: top + right faces yellow, left face black (black/yellow intersection) -->
  <path d="M50 16 L84 36 L50 56 L16 36 Z" fill="#ffd400"/>
  <path d="M16 36 L50 56 L50 90 L16 70 Z" fill="#0f0f0f"/>
  <path d="M84 36 L50 56 L50 90 L84 70 Z" fill="#e8bf00"/>
  <!-- maze path threading the cube, with two open exits (top + bottom) -->
  <path d="M50 8 L50 24 L36 32 L50 40 L64 32" fill="none" stroke="#0f0f0f" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M33 52 L33 66 L50 76" fill="none" stroke="#ffd400" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M67 52 L67 66 L50 76 L50 96" fill="none" stroke="#0f0f0f" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
