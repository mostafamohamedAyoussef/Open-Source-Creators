<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open-Source Content Creation Directory</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1>Open-Source Content Creation Directory</h1>
            <p>The continuously updated database of open-source tools for creators, replacing commercial giants.</p>
            
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search by name, description, or commercial alternative (e.g. Runway, CapCut)...">
            </div>
            
            <div class="filters" id="categoryFilters">
                <!-- Category buttons injected via JS -->
            </div>
            
            <div class="sort-controls">
                <label>Sort by:</label>
                <select id="sortSelect">
                    <option value="score">Overall Score</option>
                    <option value="stars">GitHub Stars</option>
                    <option value="recent">Recently Updated</option>
                </select>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="loading" class="loading">Loading database...</div>
        <div id="resultsInfo" class="results-info"></div>
        <div class="grid" id="toolsGrid">
            <!-- Cards injected via JS -->
        </div>
    </main>

    <footer>
        <div class="container">
            <p>Updated daily via GitHub Actions • Built with open-source tools</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
